{% extends "base.html" %}
{% block title %}Магазины — Фэнъюнь{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1>Точки <span>выдачи</span></h1>
    <p>Выберите город</p>
  </div>
</div>

<div class="container py-4">
  {% for city in cities %}
  <div class="mb-5">
    <div class="section-header">
      <h2>{{ city.name }}</h2>
      <span class="section-header-line"></span>
    </div>
    <div class="row g-3">
      {% for p in city.pickup_points.all %}
      <div class="col-md-6">
        <div class="fy-card h-100" style="border-left:4px solid var(--yellow);">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <div style="width:32px;height:32px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;">🏪</div>
            <div style="font-weight:900;font-size:1rem;">{{ p.name }}</div>
          </div>
          <div style="font-size:0.85rem;color:var(--gray-dark);padding-left:42px;">
            <i class="bi bi-geo-alt-fill" style="color:var(--yellow);"></i> {{ p.address }}
          </div>
          <div style="padding-left:42px;margin-top:6px;">
            <a href="https://maps.google.com/?q={{ p.address|urlencode }}+{{ p.city.name|urlencode }}" target="_blank" rel="noopener" style="font-size:0.78rem;font-weight:800;color:var(--yellow-dark);text-decoration:none;">
              <i class="bi bi-map"></i> Показать на карте →
            </a>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
